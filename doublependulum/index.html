<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Double Pendulum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <canvas id="scene" aria-label="Double pendulum simulation"></canvas>

    <section class="phase-panel" aria-label="Angle phase portrait">
      <canvas id="phase" aria-label="[0,1] squared phase portrait for both pendulum angles"></canvas>
    </section>

    <aside class="wind-panel" aria-label="Current wind perturbation">
      <div class="wind-label">
        Wind
        <strong id="windTopValue">0.03 m/s²</strong>
      </div>
      <span class="wind-icon" aria-hidden="true">≋</span>
    </aside>

    <section class="panel" aria-label="Simulation controls">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <h1>Double Pendulum</h1>
        </div>
      </div>

      <div class="panel-primary">
        <div class="target-grid" role="group" aria-label="Target states">
          <button class="target-button active" data-target="0">0<br><span>Down</span></button>
          <button class="target-button" data-target="1">1<br><span>V</span></button>
          <button class="target-button" data-target="2">2<br><span>Lambda</span></button>
          <button class="target-button" data-target="3">3<br><span>Upright</span></button>
        </div>

        <div class="panel-actions">
          <button id="pauseToggle" class="pause-button" type="button">Pause</button>

          <button
            id="panelCollapseToggle"
            class="panel-collapse-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="advancedControls"
            title="Show parameters"
          >
            <span class="panel-collapse-label">Params</span>
            <span class="panel-collapse-icon" aria-hidden="true">⌄</span>
          </button>
        </div>
      </div>

      <div id="advancedControls" class="advanced-controls" hidden>
        <label class="slider-row">
          <span>Max acceleration</span>
          <output id="maxAccValue">18.0 m/s²</output>
          <input id="maxAcc" type="range" min="1" max="60" value="18" step="0.5" />
        </label>

        <label class="slider-row">
          <span>Gravity</span>
          <output id="gravityValue">9.00 m/s²</output>
          <input id="gravity" type="range" min="0" max="12" value="9.00" step="0.01" />
        </label>

        <label class="slider-row">
          <span>Wind perturbation</span>
          <output id="windValue">0.03 m/s²</output>
          <input id="wind" type="range" min="0" max="1" value="0.03" step="0.005" />
        </label>

        <label class="slider-row">
          <span>Friction</span>
          <output id="frictionValue">0.03</output>
          <input id="friction" type="range" min="0" max="1" value="0.03" step="0.005" />
        </label>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    (() => {
      const root = document.documentElement;
      const scene = document.getElementById('scene');
      const phasePanel = document.querySelector('.phase-panel');
      const windPanel = document.querySelector('.wind-panel');
      const controlPanel = document.querySelector('.panel');
      const panelCollapseToggle = document.getElementById('panelCollapseToggle');
      const advancedControls = document.getElementById('advancedControls');
      const collapseLabel = panelCollapseToggle.querySelector('.panel-collapse-label');
      const windInput = document.getElementById('wind');
      const windValue = document.getElementById('windValue');
      const windTopValue = document.getElementById('windTopValue');
      const mobileQuery = window.matchMedia('(max-width: 720px)');

      let layoutFrame = 0;
      let lastSceneWidth = 0;
      let lastSceneHeight = 0;
      let sendingSyntheticResize = false;

      function syncWindReadout() {
        windTopValue.textContent = windValue.textContent.trim() || `${Number(windInput.value).toFixed(2)} m/s²`;
      }

      function setPanelExpanded(expanded) {
        panelCollapseToggle.setAttribute('aria-expanded', String(expanded));
        advancedControls.hidden = !expanded;
        collapseLabel.textContent = expanded ? 'Close' : 'Params';
        panelCollapseToggle.title = expanded ? 'Hide parameters' : 'Show parameters';
        scheduleLayoutSync();
      }

      function syncMobileLayout() {
        layoutFrame = 0;

        if (!mobileQuery.matches) {
          root.style.removeProperty('--scene-safe-top');
          root.style.removeProperty('--scene-safe-bottom');
          root.style.removeProperty('--mobile-panel-max-height');
          return;
        }

        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        const phaseBottom = phasePanel.getBoundingClientRect().bottom;
        const windBottom = windPanel.getBoundingClientRect().bottom;
        const topReserve = Math.ceil(Math.max(phaseBottom, windBottom) + 8);

        // Keep a meaningful central viewport for the rail, cart and pendulum.
        const minimumSceneHeight = Math.max(150, Math.min(280, viewportHeight * 0.38));
        const maxPanelHeight = Math.max(96, Math.floor(viewportHeight - topReserve - minimumSceneHeight - 8));
        root.style.setProperty('--mobile-panel-max-height', `${maxPanelHeight}px`);

        // Read again after applying the panel height limit.
        const panelRect = controlPanel.getBoundingClientRect();
        const bottomReserve = Math.ceil(Math.max(0, viewportHeight - panelRect.top) + 8);
        root.style.setProperty('--scene-safe-top', `${topReserve}px`);
        root.style.setProperty('--scene-safe-bottom', `${bottomReserve}px`);

        requestAnimationFrame(() => {
          const rect = scene.getBoundingClientRect();
          const sizeChanged = Math.abs(rect.width - lastSceneWidth) > 1 || Math.abs(rect.height - lastSceneHeight) > 1;
          lastSceneWidth = rect.width;
          lastSceneHeight = rect.height;

          // Most canvas renderers resize from clientWidth/clientHeight on resize.
          if (sizeChanged && !sendingSyntheticResize) {
            sendingSyntheticResize = true;
            window.dispatchEvent(new Event('resize'));
            sendingSyntheticResize = false;
          }
        });
      }

      function scheduleLayoutSync() {
        if (layoutFrame) cancelAnimationFrame(layoutFrame);
        layoutFrame = requestAnimationFrame(syncMobileLayout);
      }

      panelCollapseToggle.addEventListener('click', () => {
        const isExpanded = panelCollapseToggle.getAttribute('aria-expanded') === 'true';
        setPanelExpanded(!isExpanded);
      });

      windInput.addEventListener('input', syncWindReadout);
      windInput.addEventListener('change', syncWindReadout);
      new MutationObserver(syncWindReadout).observe(windValue, {
        childList: true,
        characterData: true,
        subtree: true
      });

      window.addEventListener('resize', () => {
        if (!sendingSyntheticResize) scheduleLayoutSync();
      }, { passive: true });
      window.addEventListener('orientationchange', scheduleLayoutSync, { passive: true });
      window.visualViewport?.addEventListener('resize', scheduleLayoutSync, { passive: true });
      mobileQuery.addEventListener?.('change', scheduleLayoutSync);

      if ('ResizeObserver' in window) {
        const resizeObserver = new ResizeObserver(scheduleLayoutSync);
        resizeObserver.observe(phasePanel);
        resizeObserver.observe(windPanel);
        resizeObserver.observe(controlPanel);
      }

      syncWindReadout();
      setPanelExpanded(false);
      scheduleLayoutSync();
      window.addEventListener('load', scheduleLayoutSync, { once: true });
    })();
  </script>
</body>
</html>
