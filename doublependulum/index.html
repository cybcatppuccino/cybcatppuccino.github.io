<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Double Pendulum</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .panel-collapse-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      width: fit-content;
      margin: 0.45rem auto 0;
      padding: 0.28rem 0.65rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: inherit;
      font: inherit;
      font-size: 0.75rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.78;
      transition: opacity 160ms ease, background-color 160ms ease, transform 160ms ease;
    }

    .panel-collapse-toggle:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.12);
    }

    .panel-collapse-toggle:active {
      transform: scale(0.97);
    }

    .panel-collapse-toggle:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    .panel-collapse-icon {
      display: inline-block;
      font-size: 0.9rem;
      transition: transform 180ms ease;
    }

    .panel-collapse-toggle[aria-expanded="true"] .panel-collapse-icon {
      transform: rotate(180deg);
    }

    .advanced-controls[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <canvas id="scene" aria-label="Double pendulum simulation"></canvas>

    <section class="phase-panel" aria-label="Angle phase portrait">
      <canvas id="phase" aria-label="[0,1] squared phase portrait for both pendulum angles"></canvas>
    </section>

    <section class="panel" aria-label="Simulation controls">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <h1>Double Pendulum</h1>
        </div>
      </div>

      <div class="target-grid" role="group" aria-label="Target states">
        <button class="target-button active" data-target="0">0<br><span>Down</span></button>
        <button class="target-button" data-target="1">1<br><span>V</span></button>
        <button class="target-button" data-target="2">2<br><span>Lambda</span></button>
        <button class="target-button" data-target="3">3<br><span>Upright</span></button>
      </div>

      <button id="pauseToggle" class="pause-button" type="button">Pause</button>

      <button
        id="panelCollapseToggle"
        class="panel-collapse-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="advancedControls"
        title="params"
      >
        <span class="panel-collapse-label">show</span>
        <span class="panel-collapse-icon" aria-hidden="true">⌄</span>
      </button>

      <div id="advancedControls" class="advanced-controls" hidden>
        <label class="slider-row">
          <span>Max acceleration</span>
          <output id="maxAccValue">20.0 m/s²</output>
          <input id="maxAcc" type="range" min="1" max="60" value="20" step="0.5" />
        </label>

        <label class="slider-row">
          <span>Gravity</span>
          <output id="gravityValue">9.00 m/s²</output>
          <input id="gravity" type="range" min="0" max="12" value="9.00" step="0.01" />
        </label>

        <label class="slider-row">
          <span>Wind perturbation</span>
          <output id="windValue">0.03 m/s²</output>
          <input id="wind" type="range" min="0" max="1" value="0.03" step="0.005" />
        </label>

        <label class="slider-row">
          <span>Friction</span>
          <output id="frictionValue">0.03</output>
          <input id="friction" type="range" min="0" max="1" value="0.03" step="0.005" />
        </label>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    const panelCollapseToggle = document.getElementById('panelCollapseToggle');
    const advancedControls = document.getElementById('advancedControls');
    const collapseLabel = panelCollapseToggle.querySelector('.panel-collapse-label');

    panelCollapseToggle.addEventListener('click', () => {
      const isExpanded = panelCollapseToggle.getAttribute('aria-expanded') === 'true';
      const nextExpandedState = !isExpanded;

      panelCollapseToggle.setAttribute('aria-expanded', String(nextExpandedState));
      advancedControls.hidden = !nextExpandedState;
      collapseLabel.textContent = nextExpandedState ? 'hide' : 'show';
      panelCollapseToggle.title = nextExpandedState ? 'hide' : 'show';
    });
  </script>

</body>
</html>
